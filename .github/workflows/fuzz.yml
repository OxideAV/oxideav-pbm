name: Fuzz

# Daily fuzz run for the cargo-fuzz harnesses under fuzz/. Splits the
# 30-minute total budget across the 3 targets (~10 min each). All
# targets are decode/encode-only and panic-free: there's no external
# library oracle (workspace policy bars libnetpbm / pnm source), so no
# extra apt packages are needed.

on:
  schedule:
    - cron: "47 6 * * *"   # daily 06:47 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      time_budget_seconds: 1800
    secrets: inherit
